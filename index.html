<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Studio — Whitelist Manager</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #080a10;
  --bg2:       #0d1018;
  --surface:   #111420;
  --surface2:  #161924;
  --border:    #1e2333;
  --border2:   #252c40;
  --accent:    #7c6af7;
  --accent-glow: rgba(124,106,247,.35);
  --accent2:   #3ef0a8;
  --accent2-glow: rgba(62,240,168,.25);
  --accent3:   #38b8f5;
  --danger:    #f76a6a;
  --danger-glow: rgba(247,106,106,.2);
  --warning:   #f5a623;
  --text:      #e4e8f5;
  --text2:     #a8b0cc;
  --muted:     #5a6285;
  --sidebar-w: 240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
  font-size: 14px;
}

/* ── BACKGROUND TEXTURE ───────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(124,106,247,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(62,240,168,.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
  z-index: 10;
  transition: transform .25s ease;
}

/* Logo */
.sb-logo {
  padding: 22px 18px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, rgba(124,106,247,.08) 0%, transparent 60%);
  position: relative;
  overflow: hidden;
}
.sb-logo::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.sb-logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, rgba(124,106,247,.3), rgba(62,240,168,.15));
  border: 1px solid rgba(124,106,247,.4);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(124,106,247,.2);
}
.sb-logo-icon svg { width: 20px; height: 20px; }
.sb-logo-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.01em;
}
.sb-logo-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 1px;
}

/* Nav */
.sb-nav {
  flex: 1;
  padding: 14px 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.sb-section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 10px 10px 6px;
}
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 9px;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text2);
  transition: all .15s;
  border: 1px solid transparent;
  user-select: none;
  position: relative;
}
.sb-item:hover {
  color: var(--text);
  background: rgba(255,255,255,.04);
}
.sb-item.active {
  color: var(--accent);
  background: rgba(124,106,247,.1);
  border-color: rgba(124,106,247,.22);
}
.sb-item.active::before {
  content: '';
  position: absolute;
  left: -10px;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
  box-shadow: 0 0 8px var(--accent);
}
.sb-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .85; }
.sb-item.active svg { opacity: 1; }

.sb-sep { height: 1px; background: var(--border); margin: 4px 6px; }

/* User zone */
.sb-user {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,.2);
}
.sb-avatar {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), #5b4de0);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(124,106,247,.3);
}
.sb-username {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.sb-logout {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  transition: all .15s;
}
.sb-logout:hover { color: var(--danger); background: rgba(247,106,106,.08); }

/* ══════════════════════════════════
   MAIN AREA
══════════════════════════════════ */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* Topbar */
#topbar {
  height: 60px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(13,16,24,.8);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 14px;
}
#topbar-title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 18px;
  flex: 1;
  letter-spacing: -.01em;
}
#topbar-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 4px 12px;
  border-radius: 20px;
  background: rgba(124,106,247,.12);
  color: var(--accent);
  border: 1px solid rgba(124,106,247,.25);
  letter-spacing: .08em;
}
#menu-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 4px;
}

/* Content */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 32px 32px;
  scroll-behavior: smooth;
}
#content::-webkit-scrollbar { width: 5px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ══════════════════════════════════
   LOGIN PAGE
══════════════════════════════════ */
#login-page {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  flex-direction: column;
  gap: 24px;
}
#login-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(124,106,247,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(62,240,168,.07) 0%, transparent 50%);
  pointer-events: none;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 44px 40px;
  text-align: center;
  width: 360px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  align-items: center;
  position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
}
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,106,247,.6), transparent);
}

.login-logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}
.login-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, rgba(124,106,247,.25), rgba(62,240,168,.1));
  border: 1px solid rgba(124,106,247,.4);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(124,106,247,.25);
}
.login-icon svg { width: 28px; height: 28px; }
.login-brand-name { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.login-brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-top: 2px;
}

.login-sub {
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.6;
}

.btn-google {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  color: #1a1a2e;
  border: none;
  border-radius: 10px;
  padding: 12px 22px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: all .15s;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.btn-google:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.4); }
.btn-google:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.login-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  min-height: 16px;
}

/* ══════════════════════════════════
   SECTION HEADERS
══════════════════════════════════ */
.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.section-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.02em;
}
.section-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
  font-weight: 400;
}

/* ══════════════════════════════════
   CARDS
══════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  position: relative;
}
.card + .card { margin-top: 14px; }

.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.card-header-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-header-icon.purple {
  background: rgba(124,106,247,.15);
  color: var(--accent);
  border: 1px solid rgba(124,106,247,.2);
}
.card-header-icon.green {
  background: rgba(62,240,168,.1);
  color: var(--accent2);
  border: 1px solid rgba(62,240,168,.2);
}
.card-header-icon svg { width: 16px; height: 16px; }
.card-title {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.01em;
}
.card-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:640px){ .grid-2{ grid-template-columns: 1fr } }

/* ══════════════════════════════════
   STAT CARDS
══════════════════════════════════ */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
@media(max-width:640px){ .stats-row{ grid-template-columns: 1fr 1fr } }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.stat-card.purple::before { background: linear-gradient(90deg, var(--accent), transparent); }
.stat-card.green::before  { background: linear-gradient(90deg, var(--accent2), transparent); }
.stat-card.blue::before   { background: linear-gradient(90deg, var(--accent3), transparent); }
.stat-card.purple { border-top-color: rgba(124,106,247,.4); }
.stat-card.green  { border-top-color: rgba(62,240,168,.3); }
.stat-card.blue   { border-top-color: rgba(56,184,245,.3); }

.stat-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.stat-card.purple .stat-icon { background: rgba(124,106,247,.12); color: var(--accent); }
.stat-card.green  .stat-icon { background: rgba(62,240,168,.08); color: var(--accent2); }
.stat-card.blue   .stat-icon { background: rgba(56,184,245,.08); color: var(--accent3); }
.stat-icon svg { width: 18px; height: 18px; }

.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-card.purple .stat-num { color: var(--accent); }
.stat-card.green  .stat-num { color: var(--accent2); }
.stat-card.blue   .stat-num { color: var(--accent3); }

.stat-label {
  font-size: 11.5px;
  color: var(--text2);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .06em;
}

/* ══════════════════════════════════
   FORM ELEMENTS
══════════════════════════════════ */
.field { display: flex; flex-direction: column; gap: 8px; }
.field label {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.badge-req {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
  background: rgba(62,240,168,.12);
  color: var(--accent2);
  border: 1px solid rgba(62,240,168,.25);
  letter-spacing: .04em;
  font-weight: 600;
}
.badge-opt {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 10px;
  background: rgba(90,98,133,.12);
  color: var(--muted);
  border: 1px solid rgba(90,98,133,.2);
  letter-spacing: .04em;
  font-weight: 500;
}

input[type=text],
input[type=password],
select,
textarea {
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: 9px;
  padding: 11px 14px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  width: 100%;
  transition: border-color .15s, box-shadow .15s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,106,247,.12);
}
input::placeholder { color: var(--muted); }
select option { background: var(--surface); }

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: 9px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  letter-spacing: .01em;
  white-space: nowrap;
}
.btn svg { width: 13px; height: 13px; flex-shrink: 0; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #5b4de0);
  color: white;
  box-shadow: 0 4px 14px rgba(124,106,247,.3);
}
.btn-primary:hover {
  filter: brightness(1.12);
  box-shadow: 0 4px 18px rgba(124,106,247,.45);
  transform: translateY(-1px);
}

.btn-success {
  background: linear-gradient(135deg, rgba(62,240,168,.2), rgba(62,240,168,.1));
  color: var(--accent2);
  border: 1px solid rgba(62,240,168,.3);
}
.btn-success:hover { background: rgba(62,240,168,.25); transform: translateY(-1px); }

.btn-danger {
  background: rgba(247,106,106,.1);
  color: var(--danger);
  border: 1px solid rgba(247,106,106,.25);
}
.btn-danger:hover { background: rgba(247,106,106,.18); }

.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border2);
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.04); }

.btn-sm { padding: 7px 13px; font-size: 12px; }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

/* ══════════════════════════════════
   PRODUCT CHIPS
══════════════════════════════════ */
.product-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border2);
  color: var(--text2);
  transition: all .15s;
  user-select: none;
  background: var(--bg2);
}
.chip:hover { border-color: rgba(124,106,247,.4); color: var(--text); }
.chip.selected {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(124,106,247,.1);
  box-shadow: 0 0 0 3px rgba(124,106,247,.08);
}
.chip.selected::before { content: '✓ '; font-size: 11px; }

/* ══════════════════════════════════
   LIST ITEMS
══════════════════════════════════ */
.list-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  margin-bottom: 10px;
  transition: all .15s;
}
.list-item:hover {
  border-color: rgba(124,106,247,.3);
  background: var(--surface2);
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
}
.list-avatar {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: rgba(124,106,247,.12);
  border: 1px solid rgba(124,106,247,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.list-avatar.community {
  background: rgba(62,240,168,.08);
  border-color: rgba(62,240,168,.18);
}
.list-info { flex: 1; min-width: 0; }
.list-name {
  font-size: 14.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.list-id-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(124,106,247,.1);
  border: 1px solid rgba(124,106,247,.18);
  padding: 2px 8px;
  border-radius: 5px;
}
.list-id-badge.community { color: var(--accent2); background: rgba(62,240,168,.08); border-color: rgba(62,240,168,.18); }
.list-meta {
  font-size: 11.5px;
  color: var(--muted);
  margin-bottom: 6px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.list-products { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 6px;
  background: rgba(124,106,247,.1);
  color: var(--accent);
  border: 1px solid rgba(124,106,247,.18);
  font-weight: 500;
}
.pill-green {
  background: rgba(62,240,168,.08);
  color: var(--accent2);
  border-color: rgba(62,240,168,.18);
}

/* ══════════════════════════════════
   KEBAB MENU
══════════════════════════════════ */
.kebab-wrap { position: relative; }
.kebab-btn {
  background: none;
  border: 1.5px solid var(--border2);
  color: var(--muted);
  cursor: pointer;
  padding: 7px 8px;
  border-radius: 8px;
  display: flex; align-items: center;
  transition: all .15s;
}
.kebab-btn:hover { background: rgba(255,255,255,.06); color: var(--text); border-color: var(--border2); }
.kebab-menu {
  position: absolute; right: 0; top: calc(100% + 6px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  min-width: 170px;
  z-index: 50;
  box-shadow: 0 12px 32px rgba(0,0,0,.5);
  overflow: hidden;
  display: none;
}
.kebab-menu.open { display: block; }
.kebab-action {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  font-size: 12.5px;
  color: var(--text2);
  cursor: pointer;
  transition: background .1s;
}
.kebab-action:hover { background: rgba(255,255,255,.05); color: var(--text); }
.kebab-action.danger { color: var(--danger); }
.kebab-action.danger:hover { background: rgba(247,106,106,.08); }
.kebab-action svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 32px;
  width: 380px;
  max-width: 90vw;
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
  position: relative;
}
.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(247,106,106,.5), transparent);
}
.modal-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: rgba(247,106,106,.1);
  border: 1px solid rgba(247,106,106,.25);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  color: var(--danger);
}
.modal-icon svg { width: 22px; height: 22px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; letter-spacing: -.01em; }
.modal-body { font-size: 13.5px; color: var(--text2); line-height: 1.65; margin-bottom: 24px; }
.modal-body strong { color: var(--text); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
#toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 500;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}
.toast {
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  background: var(--surface2);
  border: 1px solid var(--border2);
  animation: toastIn .2s ease;
  max-width: 320px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.toast.success { border-color: rgba(62,240,168,.3); color: var(--accent2); }
.toast.success::before { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
.toast.error { border-color: rgba(247,106,106,.3); color: var(--danger); }
.toast.error::before { background: var(--danger); box-shadow: 0 0 6px var(--danger); }
.toast.info { border-color: rgba(124,106,247,.3); color: var(--accent); }
.toast.info::before { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
@keyframes toastIn { from{opacity:0;transform:translateY(10px) scale(.95)} to{opacity:1;transform:none} }

/* ══════════════════════════════════
   EMPTY STATE
══════════════════════════════════ */
.empty {
  text-align: center;
  padding: 56px 28px;
  color: var(--muted);
  border: 1.5px dashed var(--border2);
  border-radius: 14px;
}
.empty svg { width: 44px; height: 44px; margin-bottom: 14px; opacity: .35; }
.empty p { font-size: 13.5px; line-height: 1.65; }
.empty strong { color: var(--text2); font-weight: 500; }

/* ══════════════════════════════════
   SETTINGS
══════════════════════════════════ */
.settings-label {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 12px;
}
.product-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.product-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg2);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  transition: border-color .15s;
}
.product-row:hover { border-color: rgba(124,106,247,.3); }
.product-row input { flex: 1; }

/* ══════════════════════════════════
   DIVIDER & MISC
══════════════════════════════════ */
.divider { height: 1px; background: var(--border); margin: 18px 0; }
code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  background: rgba(124,106,247,.1);
  color: var(--accent);
  padding: 2px 7px;
  border-radius: 5px;
  border: 1px solid rgba(124,106,247,.15);
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.12);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to{ transform: rotate(360deg) } }

.log-box {
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  max-height: 180px;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 2;
}
.log-ok { color: var(--accent2); }
.log-err { color: var(--danger); }
.log-info { color: var(--muted); }

/* Alert card */
.alert-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px;
  border-radius: 12px;
  margin-top: 14px;
  border: 1px solid;
}
.alert-card.warning {
  background: rgba(245,166,35,.06);
  border-color: rgba(245,166,35,.25);
  color: var(--warning);
}
.alert-card.warning .alert-text { color: var(--text2); font-size: 13px; }
.alert-card.warning .alert-text a { color: var(--warning); text-decoration: none; font-weight: 600; }
.alert-card.warning .alert-text a:hover { text-decoration: underline; }
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* Quick action row on dashboard */
.quick-actions {
  display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px;
}

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media(max-width:640px){
  #sidebar { position:fixed;top:0;left:0;height:100%;transform:translateX(-100%); }
  #sidebar.open { transform:none; }
  #menu-btn { display:flex; }
  #content { padding:20px 16px; }
}

/* ══════════════════════════════════
   DASHBOARD
══════════════════════════════════ */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse-glow-db {
  0%,100% { box-shadow:0 0 8px rgba(124,106,247,.35); }
  50%      { box-shadow:0 0 22px rgba(124,106,247,.65); }
}
.dash-fade{animation:fadeUp .5s ease both}
.dash-fade:nth-child(1){animation-delay:.04s}.dash-fade:nth-child(2){animation-delay:.10s}
.dash-fade:nth-child(3){animation-delay:.17s}.dash-fade:nth-child(4){animation-delay:.24s}
.dash-fade:nth-child(5){animation-delay:.31s}.dash-fade:nth-child(6){animation-delay:.38s}
.dash-fade:nth-child(7){animation-delay:.45s}

.dash-greeting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:12px}
.dash-greeting-left{display:flex;align-items:center;gap:14px}
.dash-avatar{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--accent),#5b4de0);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;animation:pulse-glow-db 3s ease-in-out infinite}
.dash-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.dash-title span{color:var(--accent)}
.dash-sub{font-size:13px;color:var(--text2);margin-top:3px}
.dash-clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px}
.dash-clock .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2)}

.dash-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:700px){.dash-stats-grid{grid-template-columns:1fr 1fr}}
.dash-stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px 18px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;cursor:default}
.dash-stat:hover{transform:translateY(-3px)}
.dash-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.dash-stat.purple::before{background:linear-gradient(90deg,var(--accent),transparent)}
.dash-stat.green::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.dash-stat.blue::before{background:linear-gradient(90deg,var(--accent3),transparent)}

.dash-stat.green:hover{border-color:rgba(62,240,168,.25);box-shadow:0 8px 24px rgba(62,240,168,.08)}
.dash-stat.blue:hover{border-color:rgba(56,184,245,.25);box-shadow:0 8px 24px rgba(56,184,245,.08)}
.dash-stat.orange:hover{border-color:rgba(245,166,35,.25);box-shadow:0 8px 24px rgba(245,166,35,.08)}
.dash-stat-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.dash-stat.purple .dash-stat-icon{background:rgba(124,106,247,.12)}
.dash-stat.green .dash-stat-icon{background:rgba(62,240,168,.08)}
.dash-stat.blue .dash-stat-icon{background:rgba(56,184,245,.08)}
.dash-stat.orange .dash-stat-icon{background:rgba(245,166,35,.08)}
.dash-stat-num{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;line-height:1;margin-bottom:5px}
.dash-stat.purple .dash-stat-num{color:var(--accent)}
.dash-stat.green .dash-stat-num{color:var(--accent2)}
.dash-stat.blue .dash-stat-num{color:var(--accent3)}
.dash-stat.orange .dash-stat-num{color:var(--warning)}
.dash-stat-label{font-size:10.5px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.dash-stat-trend{position:absolute;top:13px;right:13px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px}
.dash-stat-trend.up{background:rgba(62,240,168,.1);color:var(--accent2)}
.dash-stat-trend.nt{background:rgba(90,98,133,.1);color:var(--muted)}

.dash-charts-row{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:12px}

@media(max-width:800px){.dash-charts-row{grid-template-columns:1fr}.dash-bottom-row{grid-template-columns:1fr}}

.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 20px;transition:border-color .2s}
.dash-card:hover{border-color:var(--border2)}
.dash-card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.dash-card-title{font-size:13.5px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}

.dash-chart-wrap{position:relative;height:190px}
.dash-chart-wrap-sm{position:relative;height:148px}
.dash-donut-wrap{position:relative;height:152px;display:flex;align-items:center;justify-content:center}
.dash-donut-center{position:absolute;text-align:center;pointer-events:none}
.dash-donut-big{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent)}
.dash-donut-sm{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.dash-legend{display:flex;flex-direction:column;gap:7px;margin-top:11px}
.dash-legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.dash-legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dash-legend-label{flex:1;color:var(--text2)}
.dash-legend-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600}

.dash-activity-list{display:flex;flex-direction:column;gap:8px}
.dash-act-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);transition:border-color .15s,background .15s;cursor:default}
.dash-act-item:hover{border-color:rgba(124,106,247,.2);background:rgba(124,106,247,.03)}
.dash-act-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dash-act-dot.add{background:var(--accent2);box-shadow:0 0 5px var(--accent2)}
.dash-act-dot.rem{background:var(--danger);box-shadow:0 0 5px var(--danger)}
.dash-act-dot.cfg{background:var(--accent);box-shadow:0 0 5px var(--accent)}
.dash-act-info{flex:1;min-width:0}
.dash-act-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.dash-act-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0}

.dash-prod-table{width:100%;border-collapse:collapse}
.dash-prod-table th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);text-align:left;padding:0 7px 9px;border-bottom:1px solid var(--border)}
.dash-prod-table td{padding:9px 7px;font-size:12px;border-bottom:1px solid rgba(30,35,51,.5);transition:background .15s}
.dash-prod-table tr:hover td{background:rgba(255,255,255,.02)}
.dash-prod-table tr:last-child td{border-bottom:none}

function userRef()  { return db.collection('users').doc(currentUser.uid); }
function usersCol() { return userRef().collection('authorizedUsers'); }
function comCol()   { return userRef().collection('authorizedCommunities'); }

async function loadSettings() {
  try {
    const doc = await userRef().collection('data').doc('settings').get();
    if (doc.exists) settings = {...settings, ...doc.data()};
  } catch(e) { console.error(e); }
}
async function saveSettings() {
  await userRef().collection('data').doc('settings').set(settings);
}
async function loadAuthorizedUsers() {
  try {
    const snap = await usersCol().orderBy('addedAt','desc').get();
    authorizedUsers = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentPage==='users') renderPage();
    if (currentPage==='dashboard') renderPage();
  } catch(e) { console.error(e); }
}
async function loadAuthorizedCommunities() {
  try {
    const snap = await comCol().orderBy('addedAt','desc').get();

// ══════════════════════════════════════════════════════
//  ROBLOX API — via Cloudflare Worker Proxy
//  API key disimpan aman di Worker, bukan di sini
// ══════════════════════════════════════════════════════
async function robloxSetPermission(assetId, subjectId, subjectType, action) {
  if (!settings.workerUrl)   throw new Error('Worker URL belum diisi di Pengaturan');
  if (!settings.secretToken) throw new Error('Secret Token belum diisi di Pengaturan');
  const res = await fetch(settings.workerUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token:       settings.secretToken,
      assetId:     String(assetId),
      subjectId:   String(subjectId),
      subjectType: subjectType,
      action:      action,
    }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.success) {
    throw new Error(data.error || data.detail || `HTTP ${res.status}`);
  }
  return true;
}

// ══════════════════════════════════════════════════════
//  MANAGE ACCESS
// ══════════════════════════════════════════════════════
async function doManage(action) {
  const uid   = document.getElementById('in-uid')?.value.trim();
  const uname = document.getElementById('in-uname')?.value.trim();
  const gid   = document.getElementById('in-gid')?.value.trim();
  const gname = document.getElementById('in-gname')?.value.trim();
  const selectedProds = [...document.querySelectorAll('#prod-chips .chip.selected')].map(c=>({
    assetId: c.dataset.pid, name: c.dataset.pname
  }));

  if (!uid) { toast('User ID wajib diisi!','error'); return; }
  if (!selectedProds.length) { toast('Pilih minimal 1 produk','error'); return; }
  if (!settings.workerUrl || !settings.secretToken) { toast('Worker URL / Secret Token belum diisi di Pengaturan','error'); return; }

  const logEl = document.getElementById('action-log');
  logEl.style.display = 'block';
  logEl.innerHTML = '';

  function log(msg, cls='info') {
    logEl.innerHTML += `<div class="log-${cls}">${msg}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  const btnAdd = document.getElementById('btn-add');
  const btnRem = document.getElementById('btn-remove');
  if(btnAdd) btnAdd.disabled = true;
  if(btnRem) btnRem.disabled = true;

  const productIds = selectedProds.map(p=>p.assetId);
  let allOk = true;

  for (const prod of selectedProds) {
    try {
      await robloxSetPermission(prod.assetId, uid, 'User', action);
      log(`✅ User ${uid} → ${prod.name}: ${action==='Use'?'ditambahkan':'dicabut'}`, 'ok');
    } catch(e) {
      log(`❌ User ${uid} → ${prod.name}: ${e.message}`, 'err');
      allOk = false;
    }
    if (gid) {
      try {
        await robloxSetPermission(prod.assetId, gid, 'Group', action);
        log(`✅ Group ${gid} → ${prod.name}: ${action==='Use'?'ditambahkan':'dicabut'}`, 'ok');
      } catch(e) {
        log(`❌ Group ${gid} → ${prod.name}: ${e.message}`, 'err');
        allOk = false;
      }
    }
  }

  const now = firebase.firestore.FieldValue.serverTimestamp();
  if (action === 'Use') {
    const uSnap = await usersCol().where('userId','==',uid).get();
    if (uSnap.empty) {
      await usersCol().add({ userId:uid, name:uname, products:productIds, addedAt:now });
    } else {
      const existing = uSnap.docs[0];
      const merged   = [...new Set([...(existing.data().products||[]),...productIds])];
      await existing.ref.update({ products:merged, name:uname||existing.data().name });
    }
    if (gid) {
      const gSnap = await comCol().where('groupId','==',gid).get();
      if (gSnap.empty) {
        await comCol().add({ groupId:gid, name:gname, products:productIds, addedAt:now });
      } else {
        const existing = gSnap.docs[0];
        const merged   = [...new Set([...(existing.data().products||[]),...productIds])];
        await existing.ref.update({ products:merged, name:gname||existing.data().name });
      }
    }
  } else {
    const uSnap = await usersCol().where('userId','==',uid).get();
    uSnap.forEach(async doc => {
      const remaining = (doc.data().products||[]).filter(p=>!productIds.includes(p));
      if (!remaining.length) await doc.ref.delete();
      else await doc.ref.update({ products:remaining });
    });
    if (gid) {
      const gSnap = await comCol().where('groupId','==',gid).get();
      gSnap.forEach(async doc => {
        const remaining = (doc.data().products||[]).filter(p=>!productIds.includes(p));
        if (!remaining.length) await doc.ref.delete();
        else await doc.ref.update({ products:remaining });
      });
    }
  }

  if(btnAdd) btnAdd.disabled = false;
  if(btnRem) btnRem.disabled = false;

  toast(allOk ? 'Selesai!' : 'Selesai dengan beberapa error', allOk?'success':'error');
  await loadAuthorizedUsers();
  await loadAuthorizedCommunities();
}

// ══════════════════════════════════════════════════════
//  REMOVE CONFIRM
// ══════════════════════════════════════════════════════
let _pendingRemove = null;
function confirmRemove(type, docId, subjectId, productsCsv) {
  closeAllKebab();
  _pendingRemove = { type, docId, subjectId, products: productsCsv ? productsCsv.split(',').filter(Boolean) : [] };
  const label = type==='user' ? `User ID <strong>${subjectId}</strong>` : `Group ID <strong>${subjectId}</strong>`;
  document.getElementById('confirm-title').textContent = 'Cabut Akses';
  document.getElementById('confirm-body').innerHTML    = `Yakin ingin mencabut akses ${label}? Ini akan memanggil Roblox API untuk semua produk yang terdaftar.`;
  document.getElementById('confirm-modal').classList.add('open');
}
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  _pendingRemove = null;
});
document.getElementById('confirm-ok').addEventListener('click', async () => {
  document.getElementById('confirm-modal').classList.remove('open');
  if (!_pendingRemove) return;
  const { type, docId, subjectId, products } = _pendingRemove;
  _pendingRemove = null;

  const subType = type === 'user' ? 'User' : 'Group';
  let allOk = true;

  for (const pid of products) {
    try {
      await robloxSetPermission(pid, subjectId, subType, 'Revoke');
    } catch(e) {
      allOk = false;
      toast(`Error revoke ${pid}: ${e.message}`, 'error');
    }
  }

  const col = type === 'user' ? usersCol() : comCol();
  await col.doc(docId).delete().catch(console.error);
  await (type === 'user' ? loadAuthorizedUsers() : loadAuthorizedCommunities());
  toast(allOk ? 'Akses berhasil dicabut' : 'Dicabut dengan error', allOk?'success':'error');
});

// ══════════════════════════════════════════════════════
//  SETTINGS ACTIONS
// ══════════════════════════════════════════════════════
async function doSaveSettings() {
  settings.workerUrl   = document.getElementById('in-worker-url')?.value.trim()    || settings.workerUrl;
  settings.secretToken = document.getElementById('in-secret-token')?.value.trim() || settings.secretToken;
  await saveSettings();
  toast('Pengaturan tersimpan','success');
}
function addProduct() {
  if (!settings.products) settings.products = [];
  settings.products.push({ name:'', assetId:'' });
  navigateTo('settings');
}
function removeProduct(i) {
  settings.products.splice(i,1);
  navigateTo('settings');
}
async function exportData() {
  const data = { settings, authorizedUsers, authorizedCommunities, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ssstudio-whitelist-backup-${Date.now()}.json`;
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.settings) { settings = data.settings; await saveSettings(); }
      if (data.authorizedUsers) {
        for (const u of data.authorizedUsers) {
          const {id,...rest} = u;
          await usersCol().doc(id).set({...rest});
        }
        await loadAuthorizedUsers();
      }
      if (data.authorizedCommunities) {
        for (const g of data.authorizedCommunities) {
          const {id,...rest} = g;
          await comCol().doc(id).set({...rest});
        }
        await loadAuthorizedCommunities();
      }
      toast('Import berhasil!','success');
      navigateTo(currentPage);
    } catch(err) {
      toast('Gagal import: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(()=>toast('Disalin!','success')).catch(()=>{
    const t = document.createElement('textarea');
    t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove();
    toast('Disalin!','success');
  });
  closeAllKebab();
}
</script>
