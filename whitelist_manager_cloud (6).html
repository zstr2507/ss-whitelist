<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Studio — Whitelist Manager</title>

<!-- Firebase Compat SDK (no ES modules = no import errors) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #0d0f14;
  --surface:  #151821;
  --border:   #1f2330;
  --accent:   #7c6af7;
  --accent2:  #4ee8b0;
  --danger:   #f76a6a;
  --text:     #e8eaf0;
  --muted:    #6b7080;
  --sidebar-w: 220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow:hidden}

/* ── SIDEBAR ─────────────────────────────────────── */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;position:relative;z-index:10;
  transition:transform .25s ease;
}
.sb-logo{
  padding:28px 20px 20px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.sb-logo svg{width:32px;height:32px;flex-shrink:0}
.sb-logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;line-height:1.2;color:var(--text)}
.sb-logo-sub{font-size:9px;color:var(--muted);font-weight:400;letter-spacing:.08em;text-transform:uppercase}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;cursor:pointer;
  font-size:12px;color:var(--muted);letter-spacing:.02em;
  transition:all .15s;border:1px solid transparent;user-select:none;
}
.sb-item:hover{color:var(--text);background:rgba(124,106,247,.08)}
.sb-item.active{color:var(--accent);background:rgba(124,106,247,.12);border-color:rgba(124,106,247,.2)}
.sb-item svg{width:15px;height:15px;flex-shrink:0}
.sb-sep{height:1px;background:var(--border);margin:8px 4px}
.sb-user{
  padding:14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0}
.sb-username{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb-logout{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;display:flex;align-items:center}
.sb-logout:hover{color:var(--danger)}

/* ── MAIN ─────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{
  height:56px;flex-shrink:0;
  border-bottom:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;padding:0 24px;gap:12px;
}
#topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;flex:1}
#topbar-badge{
  font-size:10px;padding:3px 10px;border-radius:20px;
  background:rgba(124,106,247,.15);color:var(--accent);
  border:1px solid rgba(124,106,247,.25);letter-spacing:.06em;
}
#menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
#content{flex:1;overflow-y:auto;padding:28px 28px}

/* ── LOGIN PAGE ───────────────────────────────────── */
#login-page{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:100;
  flex-direction:column;gap:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:40px;text-align:center;width:320px;
  display:flex;flex-direction:column;gap:20px;align-items:center;
}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.login-logo svg{width:44px;height:44px}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px}
.login-sub{font-size:11px;color:var(--muted);line-height:1.6}
.btn-google{
  display:flex;align-items:center;gap:10px;
  background:white;color:#1a1a2e;
  border:none;border-radius:8px;padding:10px 20px;
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;
  cursor:pointer;width:100%;justify-content:center;
  transition:opacity .15s;
}
.btn-google:hover{opacity:.9}
.btn-google:disabled{opacity:.5;cursor:not-allowed}
.login-status{font-size:11px;color:var(--accent);min-height:16px}

/* ── CARDS & SECTIONS ────────────────────────────── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:12px;
}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.section-sub{font-size:11px;color:var(--muted);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card+.card{margin-top:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:640px){.grid-2{grid-template-columns:1fr}}

/* ── FORM ELEMENTS ────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.field .badge-req{
  display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;
  background:rgba(78,232,176,.15);color:var(--accent2);border:1px solid rgba(78,232,176,.25);
  vertical-align:middle;margin-left:4px;
}
.field .badge-opt{
  display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;
  background:rgba(107,112,128,.12);color:var(--muted);border:1px solid rgba(107,112,128,.2);
  vertical-align:middle;margin-left:4px;
}
input[type=text],input[type=password],select,textarea{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;
  color:var(--text);font-family:'DM Mono',monospace;font-size:12px;
  outline:none;width:100%;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
select option{background:var(--surface)}
.checkbox-row{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:12px;color:var(--muted)}
.checkbox-row input{width:auto}

/* ── BUTTONS ──────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;font-family:'DM Mono',monospace;
  font-size:11px;cursor:pointer;border:none;transition:all .15s;letter-spacing:.03em;
}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{filter:brightness(1.1)}
.btn-danger{background:rgba(247,106,106,.12);color:var(--danger);border:1px solid rgba(247,106,106,.2)}
.btn-danger:hover{background:rgba(247,106,106,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-sm{padding:5px 10px;font-size:10px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── PRODUCT CHIPS ────────────────────────────────── */
.product-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;
  border:1px solid var(--border);color:var(--muted);transition:all .15s;user-select:none;
}
.chip.selected{border-color:var(--accent);color:var(--accent);background:rgba(124,106,247,.1)}
.chip svg{width:12px;height:12px}

/* ── TABLE / LIST ─────────────────────────────────── */
.list-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg);
  margin-bottom:8px;transition:border-color .15s;
}
.list-item:hover{border-color:rgba(124,106,247,.3)}
.list-avatar{
  width:34px;height:34px;border-radius:8px;
  background:rgba(124,106,247,.15);display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;
}
.list-info{flex:1;min-width:0}
.list-id{font-size:12px;color:var(--text);font-weight:500}
.list-meta{font-size:10px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.list-products{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.pill{font-size:9px;padding:2px 7px;border-radius:10px;background:rgba(124,106,247,.12);color:var(--accent);border:1px solid rgba(124,106,247,.15)}
.pill-green{background:rgba(78,232,176,.1);color:var(--accent2);border-color:rgba(78,232,176,.15)}

/* ── KEBAB MENU ───────────────────────────────────── */
.kebab-wrap{position:relative}
.kebab-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:5px;border-radius:6px;display:flex;align-items:center;
  transition:all .15s;
}
.kebab-btn:hover{background:rgba(255,255,255,.07);color:var(--text)}
.kebab-menu{
  position:absolute;right:0;top:calc(100% + 4px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;min-width:150px;z-index:50;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  overflow:hidden;display:none;
}
.kebab-menu.open{display:block}
.kebab-action{
  display:flex;align-items:center;gap:8px;
  padding:9px 14px;font-size:11px;color:var(--muted);cursor:pointer;
  transition:background .1s;
}
.kebab-action:hover{background:rgba(255,255,255,.04);color:var(--text)}
.kebab-action.danger{color:var(--danger)}
.kebab-action.danger:hover{background:rgba(247,106,106,.08)}
.kebab-action svg{width:13px;height:13px;flex-shrink:0}

/* ── MODAL ────────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:28px;width:360px;max-width:90vw;
}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:8px}
.modal-body{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-body strong{color:var(--text)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── TOAST ────────────────────────────────────────── */
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  padding:10px 16px;border-radius:8px;font-size:11px;
  background:var(--surface);border:1px solid var(--border);
  animation:toastIn .2s ease;max-width:300px;
  display:flex;align-items:center;gap:8px;
}
.toast.success{border-color:rgba(78,232,176,.3);color:var(--accent2)}
.toast.error{border-color:rgba(247,106,106,.3);color:var(--danger)}
.toast.info{border-color:rgba(124,106,247,.3);color:var(--accent)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty{
  text-align:center;padding:48px 20px;color:var(--muted);
  border:1px dashed var(--border);border-radius:10px;
}
.empty svg{width:36px;height:36px;margin-bottom:12px;opacity:.4}
.empty p{font-size:12px;line-height:1.6}

/* ── STATS ROW ───────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;
}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}

/* ── SETTINGS ────────────────────────────────────── */
.settings-section{margin-bottom:24px}
.settings-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.product-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.product-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
}
.product-row input{flex:1}
.product-row .product-name{flex:1;font-size:12px}
.product-row .product-id{font-size:11px;color:var(--muted)}

/* ── RESPONSIVE ───────────────────────────────────── */
@media(max-width:640px){
  #sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%)}
  #sidebar.open{transform:none}
  #menu-btn{display:flex}
  #content{padding:20px 16px}
  .stats-row{grid-template-columns:1fr 1fr}
}

/* ── MISC ─────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:16px 0}
.tag-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(124,106,247,.1);color:var(--accent);padding:1px 6px;border-radius:4px}
.spinner{
  width:16px;height:16px;border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .6s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}
.log-box{
  background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:12px;max-height:160px;overflow-y:auto;font-size:11px;line-height:1.8;
}
.log-ok{color:var(--accent2)}.log-err{color:var(--danger)}.log-info{color:var(--muted)}
</style>
</head>

const loginPage   = document.getElementById('login-page');
const loginBtn    = document.getElementById('btn-login');
const loginStatus = document.getElementById('login-status');

function showApp(user) {
  currentUser = user;
  loginPage.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const init = user.displayName || user.email || '';
  document.getElementById('sb-avatar').textContent   = init.charAt(0).toUpperCase();
  document.getElementById('sb-username').textContent = user.displayName || user.email;
  loadSettings().then(() => {
    loadAuthorizedUsers();
    loadAuthorizedCommunities();
    navigateTo('dashboard');
  });
}

function showLogin(msg) {
  currentUser = null;
  loginPage.style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  loginBtn.disabled = false;
  loginStatus.textContent = msg || '';
}

// Cek sesi yang sudah ada
loginBtn.disabled = true;
loginStatus.textContent = 'Memeriksa sesi…';
auth.onAuthStateChanged(user => {
  if (user) showApp(user);
  else showLogin();
});

// Login pakai POPUP (lebih reliable di static hosting)
loginBtn.addEventListener('click', async function() {
  loginStatus.textContent = 'Membuka popup Google…';
  loginBtn.disabled = true;
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    if (result.user) showApp(result.user);
  } catch(err) {
    // popup diblokir → fallback ke redirect
    if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
      loginStatus.textContent = 'Popup diblokir, menggunakan redirect…';
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    } else {
      showLogin('Error: ' + err.message);
    }
  }
});

document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());

function userRef()  { return db.collection('users').doc(currentUser.uid); }
function usersCol() { return userRef().collection('authorizedUsers'); }
function comCol()   { return userRef().collection('authorizedCommunities'); }

async function loadSettings() {
  try {
    const doc = await userRef().collection('data').doc('settings').get();
    if (doc.exists) settings = {...settings, ...doc.data()};
  } catch(e) { console.error(e); }
}
async function saveSettings() {
  await userRef().collection('data').doc('settings').set(settings);
}
async function loadAuthorizedUsers() {
  try {
    const snap = await usersCol().orderBy('addedAt','desc').get();
    authorizedUsers = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentPage==='users') renderPage();
    if (currentPage==='dashboard') renderPage();
  } catch(e) { console.error(e); }
}
async function loadAuthorizedCommunities() {
  try {
    const snap = await comCol().orderBy('addedAt','desc').get();
    authorizedCommunities = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (currentPage==='communities') renderPage();
    if (currentPage==='dashboard') renderPage();
  } catch(e) { console.error(e); }
}

async function robloxSetPermission(assetId, subjectId, subjectType, action) {
  if (!settings.robloxApiKey) throw new Error('API Key belum diisi di Pengaturan');
  const url = `https://apis.roblox.com/asset-permissions-api/v1/assets/${assetId}/permissions`;
  const body = { requests:[{ subjectType, subjectId: String(subjectId), action }] };
  const res = await fetch(url, {
    method:'PATCH',
    headers:{ 'x-api-key': settings.robloxApiKey, 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const t = await res.text().catch(()=>'');
    throw new Error(`Roblox API error ${res.status}: ${t}`);
  }
  return true;
}

function afterRender(page) {
  if (page === 'manage') {
    // chip selection
    document.querySelectorAll('#prod-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('selected'));
    });
    // add / remove buttons
    document.getElementById('btn-add')?.addEventListener('click', () => doManage('Use'));
    document.getElementById('btn-remove')?.addEventListener('click', () => doManage('Revoke'));
  }
  if (page === 'users' || page === 'communities') {
    // kebab buttons
    document.querySelectorAll('.kebab-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const type = btn.dataset.ktype;
        const id   = btn.dataset.kid;
        const menu = document.getElementById(`kmenu-${type}-${id}`);
        // close others
        document.querySelectorAll('.kebab-menu.open').forEach(m => {
          if (m !== menu) m.classList.remove('open');
        });
        menu.classList.toggle('open');
      });
    });
    document.addEventListener('click', closeAllKebab, {once:true});
  }
  if (page === 'settings') {
    document.getElementById('import-file').addEventListener('change', importData);
  }
}
function closeAllKebab() {
  document.querySelectorAll('.kebab-menu.open').forEach(m => m.classList.remove('open'));
}

// ══════════════════════════════════════════════════════
//  MANAGE ACCESS
// ══════════════════════════════════════════════════════
async function doManage(action) {
  const uid   = document.getElementById('in-uid')?.value.trim();
  const uname = document.getElementById('in-uname')?.value.trim();
  const gid   = document.getElementById('in-gid')?.value.trim();
  const gname = document.getElementById('in-gname')?.value.trim();
  const selectedProds = [...document.querySelectorAll('#prod-chips .chip.selected')].map(c=>({
    assetId: c.dataset.pid, name: c.dataset.pname
  }));

  if (!uid) { toast('User ID wajib diisi!','error'); return; }
  if (!selectedProds.length) { toast('Pilih minimal 1 produk','error'); return; }
  if (!settings.robloxApiKey) { toast('API Key belum diisi di Pengaturan','error'); return; }

  const logEl = document.getElementById('action-log');
  logEl.style.display = 'block';
  logEl.innerHTML = '';

  function log(msg, cls='info') {
    logEl.innerHTML += `<div class="log-${cls}">${msg}</div>`;
    logEl.scrollTop = logEl.scrollHeight;
  }

  const btnAdd = document.getElementById('btn-add');
  const btnRem = document.getElementById('btn-remove');
  if(btnAdd) btnAdd.disabled = true;
  if(btnRem) btnRem.disabled = true;

  const productIds = selectedProds.map(p=>p.assetId);
  let allOk = true;

  for (const prod of selectedProds) {
    // User
    try {
      await robloxSetPermission(prod.assetId, uid, 'User', action);
      log(`✅ User ${uid} → ${prod.name}: ${action==='Use'?'ditambahkan':'dicabut'}`, 'ok');
    } catch(e) {
      log(`❌ User ${uid} → ${prod.name}: ${e.message}`, 'err');
      allOk = false;
    }
    // Community
    if (gid) {
      try {
        await robloxSetPermission(prod.assetId, gid, 'Group', action);
        log(`✅ Group ${gid} → ${prod.name}: ${action==='Use'?'ditambahkan':'dicabut'}`, 'ok');
      } catch(e) {
        log(`❌ Group ${gid} → ${prod.name}: ${e.message}`, 'err');
        allOk = false;
      }
    }
  }

  // Save to Firestore
  const now = firebase.firestore.FieldValue.serverTimestamp();
  if (action === 'Use') {
    // Save user record
    const uSnap = await usersCol().where('userId','==',uid).get();
    if (uSnap.empty) {
      await usersCol().add({ userId:uid, name:uname, products:productIds, addedAt:now });
    } else {
      const existing = uSnap.docs[0];
      const merged   = [...new Set([...(existing.data().products||[]),...productIds])];
      await existing.ref.update({ products:merged, name:uname||existing.data().name });
    }
    // Save community record
    if (gid) {
      const gSnap = await comCol().where('groupId','==',gid).get();
      if (gSnap.empty) {
        await comCol().add({ groupId:gid, name:gname, products:productIds, addedAt:now });
      } else {
        const existing = gSnap.docs[0];
        const merged   = [...new Set([...(existing.data().products||[]),...productIds])];
        await existing.ref.update({ products:merged, name:gname||existing.data().name });
      }
    }
  } else {
    // Revoke — remove from Firestore too
    const uSnap = await usersCol().where('userId','==',uid).get();
    uSnap.forEach(async doc => {
      const remaining = (doc.data().products||[]).filter(p=>!productIds.includes(p));
      if (!remaining.length) await doc.ref.delete();
      else await doc.ref.update({ products:remaining });
    });
    if (gid) {
      const gSnap = await comCol().where('groupId','==',gid).get();
      gSnap.forEach(async doc => {
        const remaining = (doc.data().products||[]).filter(p=>!productIds.includes(p));
        if (!remaining.length) await doc.ref.delete();
        else await doc.ref.update({ products:remaining });
      });
    }
  }

  if(btnAdd) btnAdd.disabled = false;
  if(btnRem) btnRem.disabled = false;

  toast(allOk ? 'Selesai!' : 'Selesai dengan beberapa error', allOk?'success':'error');
  await loadAuthorizedUsers();
  await loadAuthorizedCommunities();
}

// ══════════════════════════════════════════════════════
//  REMOVE CONFIRM
// ══════════════════════════════════════════════════════
let _pendingRemove = null;
function confirmRemove(type, docId, subjectId, productsCsv) {
  closeAllKebab();
  _pendingRemove = { type, docId, subjectId, products: productsCsv ? productsCsv.split(',').filter(Boolean) : [] };
  const label = type==='user' ? `User ID <strong>${subjectId}</strong>` : `Group ID <strong>${subjectId}</strong>`;
  document.getElementById('confirm-title').textContent = 'Remove Akses';
  document.getElementById('confirm-body').innerHTML    = `Yakin ingin mencabut akses ${label}? Ini akan memanggil Roblox API untuk semua produk yang terdaftar.`;
  document.getElementById('confirm-modal').classList.add('open');
}
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  _pendingRemove = null;
});
document.getElementById('confirm-ok').addEventListener('click', async () => {
  document.getElementById('confirm-modal').classList.remove('open');
  if (!_pendingRemove) return;
  const { type, docId, subjectId, products } = _pendingRemove;
  _pendingRemove = null;

  const subType = type === 'user' ? 'User' : 'Group';
  let allOk = true;

  for (const pid of products) {
    try {
      await robloxSetPermission(pid, subjectId, subType, 'Revoke');
    } catch(e) {
      allOk = false;
      toast(`Error revoke ${pid}: ${e.message}`, 'error');
    }
  }

  const col = type === 'user' ? usersCol() : comCol();
  await col.doc(docId).delete().catch(console.error);
  await (type === 'user' ? loadAuthorizedUsers() : loadAuthorizedCommunities());
  toast(allOk ? 'Akses berhasil dicabut' : 'Dicabut dengan error', allOk?'success':'error');
});

// ══════════════════════════════════════════════════════
//  SETTINGS ACTIONS
// ══════════════════════════════════════════════════════
async function doSaveSettings() {
  settings.robloxApiKey = document.getElementById('in-apikey')?.value.trim() || settings.robloxApiKey;
  await saveSettings();
  toast('Pengaturan tersimpan','success');
}
function addProduct() {
  if (!settings.products) settings.products = [];
  settings.products.push({ name:'', assetId:'' });
  navigateTo('settings');
}
function removeProduct(i) {
  settings.products.splice(i,1);
  navigateTo('settings');
}
async function exportData() {
  const data = { settings, authorizedUsers, authorizedCommunities, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ssstudio-whitelist-backup-${Date.now()}.json`;
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.settings) { settings = data.settings; await saveSettings(); }
      if (data.authorizedUsers) {
        for (const u of data.authorizedUsers) {
          const {id,...rest} = u;
          await usersCol().doc(id).set({...rest});
        }
        await loadAuthorizedUsers();
      }
      if (data.authorizedCommunities) {
        for (const g of data.authorizedCommunities) {
          const {id,...rest} = g;
          await comCol().doc(id).set({...rest});
        }
        await loadAuthorizedCommunities();
      }
      toast('Import berhasil!','success');
      navigateTo(currentPage);
    } catch(err) {
      toast('Gagal import: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-wrap').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(()=>toast('Disalin!','success')).catch(()=>{
    const t = document.createElement('textarea');
    t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove();
    toast('Disalin!','success');
  });
  closeAllKebab();
}
